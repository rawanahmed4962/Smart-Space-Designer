<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Space Designer - Premium Access</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Login.css">
</head>
<body>

<div class="scene" id="mainScene">
    <div class="sliding-plaque" id="plaqueToggle" onclick="toggleLanguage()">
        <div class="plaque-text">EN</div>
        <div class="plaque-text">AR</div>
        <div class="plaque-slider" id="plaqueSlider"></div>
    </div>

    <div class="door left"></div>
    <div class="door right"></div>
    
    <div class="sign" id="doorSign">SMART SPACE DESIGNER</div>
    
    <div class="workspace-revealed">
        <button class="close-btn" id="closeBtn">✖</button>
        
        <h2 id="formTitle">Welcome Back</h2>
        <p id="formSubtitle">Access your premium studio</p>
        
        <form id="authForm" action="Login.php" method="POST">
            <div class="floating-group" id="nameGroup">
                <input type="text" id="nameInput" name="name" placeholder=" ">
                <label for="nameInput" id="lblName">Full Name</label>
            </div>
            <div class="floating-group" id="birthdayGroup">
                <input type="date" id="bdayInput" name="bday" placeholder=" ">
                <label for="bdayInput" id="lblBday">Date of Birth</label>
            </div>
            <div class="floating-group">
                <input type="email" id="emailInput" name="email" placeholder=" " required>
                <label for="emailInput" id="lblEmail">Email Address</label>
            </div>
            <div class="floating-group">
                <input type="password" id="passInput" name="password" placeholder=" " required>
                <label for="passInput" id="lblPass">Password</label>
            </div>
            
            <button type="submit" class="main-btn" id="mainActionBtn">Enter Studio</button>
        </form>

        <div class="divider" id="lblOr">OR</div>

        <button class="social-btn btn-google">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.16v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.16C1.43 8.55 1 10.22 1 12s.43 3.45 1.16 4.93l3.68-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.16 7.07l3.68 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            <span id="lblGoogle">Continue with Google</span>
        </button>

        <button class="social-btn btn-apple">
            <svg viewBox="0 0 384 512" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
            <span id="lblApple">Continue with Apple</span>
        </button>

        <div class="toggle-text" id="toggleModeContainer"></div>
    </div>
    
    <div class="click-hint" id="doorHint">CLICK DOORS TO ENTER</div>
</div>

<div class="blueprint-overlay" id="blueprintOverlay">
    <div class="blueprint-text" id="blueprintText">INITIALIZING WORKSPACE...</div>
</div>

<script>
    const scene = document.getElementById('mainScene');
    const doors = document.querySelectorAll('.door');
    const closeBtn = document.getElementById('closeBtn');
    
    let isEnglish = true;
    let isLoginMode = true;

    // Door Interactions
    doors.forEach(door => {
        door.addEventListener('click', () => {
            if (!scene.classList.contains('open')) scene.classList.add('open');
        });
    });
    
    closeBtn.addEventListener('click', (e) => {
        e.preventDefault(); 
        scene.classList.remove('open');
    });

    const texts = {
        en: {
            sign: "SMART SPACE DESIGNER",
            hint: "CLICK DOORS TO ENTER",
            loginTitle: "Welcome Back",
            loginSub: "Access your premium studio",
            signupTitle: "Create Account",
            signupSub: "Begin your design journey",
            name: "Full Name",
            bday: "Date of Birth",
            email: "Email Address",
            pass: "Password",
            loginBtn: "Enter Studio",
            signupBtn: "Sign Up",
            or: "OR",
            google: "Continue with Google",
            apple: "Continue with Apple",
            noAccount: "Don't have an account? ",
            hasAccount: "Already have an account? ",
            actionSignup: "Sign up",
            actionLogin: "Log in"
        },
        ar: {
            sign: "مُصمم المساحات الذكية",
            hint: "انقر على الباب للدخول",
            loginTitle: "أهلاً بك مجدداً",
            loginSub: "ادخل إلى الاستوديو الخاص بك",
            signupTitle: "إنشاء حساب",
            signupSub: "ابدأ رحلة التصميم الخاصة بك",
            name: "الاسم الكامل",
            bday: "تاريخ الميلاد",
            email: "البريد الإلكتروني",
            pass: "كلمة المرور",
            loginBtn: "دخول الاستوديو",
            signupBtn: "تسجيل جديد",
            or: "أو",
            google: "المتابعة باستخدام Google",
            apple: "المتابعة باستخدام Apple",
            noAccount: "ليس لديك حساب؟ ",
            hasAccount: "لديك حساب بالفعل؟ ",
            actionSignup: "سجل الآن",
            actionLogin: "تسجيل الدخول"
        }
    };

    function updateUI() {
        const lang = isEnglish ? 'en' : 'ar';
        const t = texts[lang];

        document.body.classList.toggle('lang-ar', !isEnglish);
        document.getElementById('plaqueToggle').classList.toggle('arabic', !isEnglish);

        document.getElementById('doorSign').innerText = t.sign;
        document.getElementById('doorHint').innerText = t.hint;
        document.getElementById('lblName').innerText = t.name;
        document.getElementById('lblBday').innerText = t.bday;
        document.getElementById('lblEmail').innerText = t.email;
        document.getElementById('lblPass').innerText = t.pass;
        document.getElementById('lblOr').innerText = t.or;
        document.getElementById('lblGoogle').innerText = t.google;
        document.getElementById('lblApple').innerText = t.apple;

        if(isLoginMode) {
            document.getElementById('formTitle').innerText = t.loginTitle;
            document.getElementById('formSubtitle').innerText = t.loginSub;
            document.getElementById('mainActionBtn').innerText = t.loginBtn;
            
            document.getElementById('nameGroup').style.display = "none";
            document.getElementById('birthdayGroup').style.display = "none";
            document.getElementById('nameInput').required = false;
            document.getElementById('bdayInput').required = false;

            document.getElementById('toggleModeContainer').innerHTML = 
                `${t.noAccount}<span onclick="toggleMode()">${t.actionSignup}</span>`;
        } else {
            document.getElementById('formTitle').innerText = t.signupTitle;
            document.getElementById('formSubtitle').innerText = t.signupSub;
            document.getElementById('mainActionBtn').innerText = t.signupBtn;
            
            document.getElementById('nameGroup').style.display = "block";
            document.getElementById('birthdayGroup').style.display = "block";
            document.getElementById('nameInput').required = true;
            document.getElementById('bdayInput').required = true;

            document.getElementById('toggleModeContainer').innerHTML = 
                `${t.hasAccount}<span onclick="toggleMode()">${t.actionLogin}</span>`;
        }
    }

    function toggleMode() {
        isLoginMode = !isLoginMode;
        updateUI();
    }

    function toggleLanguage() {
        isEnglish = !isEnglish;
        updateUI();
        event.stopPropagation();
    }

    updateUI();

    document.getElementById('authForm').addEventListener('submit', (e) => {
        e.preventDefault(); // h-nwa2f el submit el 3adi 34an n3ml el animation
        const btn = document.getElementById('mainActionBtn');
        const originalText = btn.innerText;
        
        btn.innerText = isEnglish ? 'Authenticating...' : 'جاري التحقق...';
        btn.style.background = '#8B5A2B'; 

        setTimeout(() => {
            // 1. Zoom in lel scene kolha
            scene.classList.add('zoom-in');
            
            // 2. n-zher el blueprint overlay
            const blueprintOverlay = document.getElementById('blueprintOverlay');
            const blueprintText = document.getElementById('blueprintText');
            
            blueprintText.innerText = isEnglish ? 'INITIALIZING STUDIO...' : 'جاري تجهيز مساحة العمل...';
            blueprintOverlay.classList.add('active');

            // 3. b3d ma el animation y5las (ba3d 2.2 sawany), hn3ml submit bged ll PHP
            // 3. b3d ma el animation y5las, haywadek 3ala el dashboard.html 3latool mn 8er PHP
            setTimeout(() => {
                window.location.href = '../dashboard/dashboard.html'; 
            }, 2200);

        }, 800);
    });
</script>
</body>
</html>
