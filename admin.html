<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSD Studio — Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════ CSS VARIABLES ══════════ */
:root {
    --bg-main:       #F4EFE6; --bg-sidebar:    #5D4037; --bg-card:       #ffffff;
    --primary:       #5D4037; --primary-text:  #F4EFE6; --accent:        #d4af37;
    --text:          #5D4037; --text-sec:      #8D6E63; --border:        rgba(93, 64, 55, 0.1);
    --sidebar-width: 280px;   --success:       #2D8A5E; --danger:        #B83232; --warning:       #C07A2A;
    --shadow-sm:     0 2px 12px rgba(93,64,55,0.08); --shadow-md:     0 6px 28px rgba(93,64,55,0.13);
}
[data-theme="dark"] {
    --bg-main:       #0a192f; --bg-sidebar:    #112240; --bg-card:       #1e293b;
    --primary:       #E6D5C3; --primary-text:  #F4EFE6; --accent:        #d4af37;
    --text:          #f8f9fc; --text-sec:      #94a3b8; --border:        #233554;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: var(--bg-main); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; transition: 0.3s; }
.sidebar { width: var(--sidebar-width); background: var(--bg-sidebar); height: 100vh; position: fixed; display: flex; flex-direction: column; z-index: 100; border-right: 1px solid var(--border); }
.sidebar-header { padding: 30px; font-weight: 700; color: var(--primary-text); font-size: 22px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.sidebar-header i { color: var(--accent); }
.admin-pill { background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.3); border-radius: 20px; padding: 3px 10px; font-size: 10px; color: var(--accent); margin-left: auto; font-family: 'Montserrat', sans-serif; font-weight: 700; }
.nav-links { list-style: none; padding: 20px; flex: 1; }
.nav-item { padding: 12px 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--primary-text); font-size: 15px; font-weight: 600; transition: 0.2s; margin-bottom: 4px; border: none; background: none; width: 100%; text-align: left; }
.nav-item i { width: 18px; text-align: center; }
.nav-item:hover:not(.active), .nav-item.active { background: #F4EFE6; color: #5D4037; }
.nav-badge { margin-left: auto; background: var(--accent); color: var(--bg-sidebar); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; min-width: 22px; text-align: center; }
.sidebar-footer { padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.07); }
.main { margin-left: var(--sidebar-width); flex: 1; position: relative; }
.topbar { background: rgba(244,239,230,0.88); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); height: 68px; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
[data-theme="dark"] .topbar { background: rgba(17,34,64,0.88); }
.topbar-left { display: flex; align-items: center; gap: 14px; }
.page-icon { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--bg-sidebar), #3e2723); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 15px; }
.page-info h1 { font-size: 17px; font-weight: 700; }
.page-info p { font-size: 11px; color: var(--text-sec); font-family: 'Montserrat', sans-serif; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.icon-btn { width: 36px; height: 36px; border-radius: 9px; border: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-sec); transition: 0.2s; }
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
.avatar-btn { width: 36px; height: 36px; border-radius: 9px; background: linear-gradient(135deg, var(--bg-sidebar), #3e2723); display: flex; align-items: center; justify-content: center; color: var(--accent); font-weight: 700; font-size: 13px; cursor: pointer; border: 2px solid var(--accent); }
.content { padding: 28px 32px; }
.section { display: none; }
.section.active { display: block; animation: fadeUp 0.4s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 26px; }
.stat-card { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); padding: 22px 24px; box-shadow: var(--shadow-sm); position: relative; overflow: hidden; }
.stat-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; }
.stat-card.c-users::after { background: linear-gradient(90deg, var(--bg-sidebar), #8d6e63); }
.stat-card.c-projects::after{ background: linear-gradient(90deg, var(--accent), #f9d976); }
.stat-card.c-active::after { background: linear-gradient(90deg, var(--success), #5bbf95); }
.stat-card.c-admins::after { background: linear-gradient(90deg, #3e2723, #5d4037); }
.stat-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.stat-icon-wrap { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.stat-icon-wrap.u { background: rgba(93,64,55,0.1); color: var(--bg-sidebar); }
.stat-icon-wrap.p { background: rgba(212,175,55,0.12); color: #a07c00; }
.stat-icon-wrap.a { background: rgba(45,138,94,0.12); color: var(--success); }
.stat-icon-wrap.r { background: rgba(62,39,35,0.08); color: #3e2723; }
.stat-value { font-size: 34px; font-weight: 700; line-height: 1; font-family: 'Montserrat', sans-serif; }
.stat-label { font-size: 12px; color: var(--text-sec); margin-top: 5px; font-weight: 600; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 26px; }
.card { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; }
.card-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px 14px; border-bottom: 1px solid var(--border); }
.card-head h3 { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.card-head h3 i { color: var(--accent); }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: linear-gradient(135deg, var(--bg-sidebar), #3e2723); }
thead th { padding: 12px 18px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; color: rgba(244,239,230,0.7); font-family: 'Montserrat', sans-serif; }
tbody tr { border-bottom: 1px solid var(--border); }
tbody td { padding: 13px 18px; vertical-align: middle; }
.u-avatar { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: white; }
.u-name { font-weight: 700; font-size: 13px; }
.u-email { font-size: 11px; color: var(--text-sec); }
.role-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; font-family: 'Montserrat', sans-serif; }
.role-pill.admin { background: rgba(212,175,55,0.15); color: #8a6500; border: 1px solid rgba(212,175,55,0.3); }
.role-pill.user { background: rgba(93,64,55,0.08); color: var(--text-sec); border: 1px solid var(--border); }
.feed-item { display: flex; align-items: flex-start; gap: 12px; padding: 13px 22px; border-bottom: 1px solid var(--border); }
.feed-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; background: rgba(93,64,55,0.1); color: var(--bg-sidebar); }
.feed-text strong { font-size: 12px; font-weight: 700; display: block; }
.feed-text p { font-size: 11px; color: var(--text-sec); }
.toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 12px; }
.search-wrap { display: flex; align-items: center; gap: 8px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 9px 14px; }
.search-wrap input { border: none; outline: none; font-size: 13px; background: transparent; color: var(--text); }
.project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 16px; padding: 20px; }
.project-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--bg-main); }
.project-thumb { height: 110px; display: flex; align-items: center; justify-content: center; font-size: 36px; }
.project-body { padding: 14px 16px 16px; }
.project-owner { font-size: 13px; font-weight: 700; }
.project-tag { display: inline-flex; gap: 4px; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; background: rgba(93,64,55,0.08); color: var(--text-sec); }
.project-footer { display: flex; justify-content: flex-end; gap: 6px; padding: 10px 16px; border-top: 1px solid var(--border); }
.toast { position: fixed; bottom: 26px; right: 26px; background: var(--bg-sidebar); color: var(--primary-text); padding: 14px 20px; border-radius: 12px; display: flex; align-items: center; gap: 10px; font-size: 13px; transform: translateY(90px); opacity: 0; transition: 0.4s; z-index: 600; border-left: 3px solid var(--accent); }
.toast.show { transform: translateY(0); opacity: 1; }
select.modern-select { padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; outline: none; transition: 0.3s; }
select.role-select { border: 1px solid #d4af37; background: rgba(212,175,55,0.1); color: #8a6500; }
select.status-select { border: 1px solid #ccc; background: transparent; color: #555; }
</style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-header">
        <i class="fa-solid fa-wand-magic-sparkles"></i> SSD Studio
        <span class="admin-pill"><i class="fas fa-shield-halved"></i> Admin</span>
    </div>
    <ul class="nav-links">
        <li class="nav-item active" onclick="showSection('overview', this, 'fa-chart-line', 'Dashboard', 'Welcome back, Admin')">
            <i class="fa-solid fa-chart-line"></i> Dashboard
        </li>
        <li class="nav-item" onclick="showSection('users', this, 'fa-users', 'Users Management', 'View and manage all users')">
            <i class="fa-solid fa-users"></i> Users <span class="nav-badge" id="nb-users">0</span>
        </li>
        <li class="nav-item" onclick="showSection('projects', this, 'fa-layer-group', 'Projects', 'All user projects')">
            <i class="fa-solid fa-layer-group"></i> Projects <span class="nav-badge" id="nb-projects">0</span>
        </li>
        <li class="nav-item" onclick="showSection('activity', this, 'fa-clock-rotate-left', 'Activity Log', 'Full system activity history')">
            <i class="fa-solid fa-clock-rotate-left"></i> Activity Log
        </li>
        <li class="nav-item" onclick="showSection('settings', this, 'fa-sliders', 'Settings', 'Platform configuration')">
            <i class="fa-solid fa-sliders"></i> Settings
        </li>
    </ul>
   <div class="sidebar-footer">
        <button class="nav-item" onclick="confirmLogout()" style="color:#F4EFE6; opacity:0.8; justify-content: center;">
            <i class="fas fa-power-off"></i> Logout
        </button>
    </div>
</nav>

<main class="main">
    <header class="topbar">
        <div class="topbar-left">
            <div class="page-icon"><i id="topIcon" class="fas fa-chart-line"></i></div>
            <div class="page-info">
                <h1 id="pageTitle">Dashboard</h1>
                <p id="pageSub">Welcome back, Admin</p>
            </div>
        </div>
        <div class="topbar-right">
            <div class="icon-btn" onclick="fetchData()"><i class="fas fa-arrows-rotate"></i></div>
            <div class="avatar-btn">A</div>
        </div>
    </header>

    <div class="content">
        <section class="section active" id="sec-overview">
            <div class="stats-grid">
                <div class="stat-card c-users">
                    <div class="stat-top"><div class="stat-icon-wrap u"><i class="fas fa-users"></i></div></div>
                    <div class="stat-value" id="sv-users">0</div><div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card c-projects">
                    <div class="stat-top"><div class="stat-icon-wrap p"><i class="fas fa-layer-group"></i></div></div>
                    <div class="stat-value" id="sv-projects">0</div><div class="stat-label">Total Projects</div>
                </div>
                <div class="stat-card c-active">
                    <div class="stat-top"><div class="stat-icon-wrap a"><i class="fas fa-circle-check"></i></div></div>
                    <div class="stat-value" id="sv-active">0</div><div class="stat-label">Active Users</div>
                </div>
                <div class="stat-card c-admins">
                    <div class="stat-top"><div class="stat-icon-wrap r"><i class="fas fa-shield-halved"></i></div></div>
                    <div class="stat-value" id="sv-admins">0</div><div class="stat-label">Admins</div>
                </div>
            </div>

            <div class="two-col">
                <div class="card">
                    <div class="card-head"><h3><i class="fas fa-user-clock"></i> Recent Users</h3></div>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>User</th><th>Role</th><th>Status</th><th>Projects</th></tr></thead>
                            <tbody id="recentUsersTbody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="card">
                    <div class="card-head"><h3><i class="fas fa-bolt"></i> Recent Activity</h3></div>
                    <div id="miniActivityFeed"></div>
                </div>
            </div>
        </section>

        <section class="section" id="sec-users">
            <div class="toolbar">
                <div class="search-wrap"><i class="fas fa-search"></i><input type="text" id="userSearch" placeholder="Search users..."></div>
            </div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>User</th><th>Role</th><th>Status</th><th>Joined</th><th>Projects</th><th>Actions</th></tr></thead>
                        <tbody id="usersTbody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section class="section" id="sec-projects">
            <div class="toolbar">
                <div class="search-wrap"><i class="fas fa-search"></i><input type="text" id="projectSearch" placeholder="Search projects..."></div>
            </div>
            <div class="card">
                <div class="project-grid" id="projectsGrid"></div>
            </div>
        </section>

        <section class="section" id="sec-activity">
            <div class="card">
                <div id="fullActivityFeed"></div>
            </div>
        </section>

        <section class="section" id="sec-settings">
            <div class="two-col">
                <div class="card">
                    <div class="card-head"><h3 style="padding: 15px;"><i class="fas fa-sliders"></i> General Settings</h3></div>
                    <div style="padding: 22px;">
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; font-size: 12px; color: gray; margin-bottom: 5px;">Platform Name</label>
                            <input type="text" value="Smart Space Designer" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none;">
                        </div>
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; font-size: 12px; color: gray; margin-bottom: 5px;">Admin Email</label>
                            <input type="email" value="admin@ssd.com" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none;">
                        </div>
                        <button onclick="showToast('Settings saved successfully ✓')" style="background: #5D4037; color: #d4af37; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px;">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg"></span></div>

<script>
// ==========================================
// DYNAMIC DATA FETCHING & RENDERING
// ==========================================
let users = [];
let projects = [];
let activities = [];

async function fetchData() {
    try {
        const response = await fetch('/SSD/admin_api.php');
        const data = await response.json();
        
        if(data.error) { showToast("Error: " + data.error); return; }

        users = data.users || [];
        projects = data.projects || [];
        activities = data.activities || [];

        // Update Stats
        document.getElementById('sv-users').textContent = data.stats.total_users;
        document.getElementById('sv-projects').textContent = data.stats.total_projects;
        document.getElementById('sv-active').textContent = data.stats.active_users;
        document.getElementById('sv-admins').textContent = data.stats.total_admins;
        document.getElementById('nb-users').textContent = data.stats.total_users;
        document.getElementById('nb-projects').textContent = data.stats.total_projects;

        renderUsers();
        renderRecentUsers();
        renderProjects();
        renderActivities();
        
    } catch (err) {
        console.error(err);
        showToast("Failed to fetch database records.");
    }
}

// ── RENDER USERS (مع زراير التحكم الجديدة) ──
function renderUsers() {
    const tbody = document.getElementById('usersTbody');
    tbody.innerHTML = users.map(u => `
        <tr>
            <td>
                <div style="display:flex; gap:10px; align-items:center;">
                    <div class="u-avatar" style="background:${u.color}">${u.name.substring(0,2).toUpperCase()}</div>
                    <div><div class="u-name">${u.name}</div><div class="u-email">${u.email}</div></div>
                </div>
            </td>
            <td>
                <select class="modern-select role-select" onchange="updateUserProperty(${u.id}, 'role', this.value)">
                    <option value="guest" ${u.role === 'guest' ? 'selected' : ''}>Guest</option>
                    <option value="premium" ${u.role === 'premium' ? 'selected' : ''}>Premium</option>
                    <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                </select>
            </td>
            <td>
                <select class="modern-select status-select" onchange="updateUserProperty(${u.id}, 'status', this.value)">
                    <option value="active" ${u.status === 'active' ? 'selected' : ''}>Active</option>
                    <option value="inactive" ${u.status === 'inactive' ? 'selected' : ''}>Inactive</option>
                    <option value="blocked" ${u.status === 'blocked' ? 'selected' : ''}>Blocked</option>
                </select>
            </td>
            <td style="font-size:12px;">${u.joined}</td>
            <td style="font-weight:bold;">${u.projects}</td>
            <td>
                <button class="action-btn" onclick="deleteUser(${u.id}, '${u.name}')"><i class="fas fa-trash" style="color:red;"></i></button>
            </td>
        </tr>
    `).join('');
}

// ── السكريبت السحري لتحديث الداتابيز ──
async function updateUserProperty(userId, propertyName, newValue) {
    try {
        const payload = { user_id: userId };
        payload[propertyName] = newValue; 

        const response = await fetch('/SSD/update_user.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        
        if (result.status === "success") {
            showToast(`✅ User ${propertyName} updated!`);
            fetchData(); // بيعمل ريفريش للداتا أوتوماتيك
        } else {
            showToast("❌ Error: " + result.error);
        }
    } catch (error) {
        console.error(error);
        showToast("❌ Connection error while updating.");
    }
}

// ── السكريبت الجديد لمسح اليوزر من الداتابيز ──
async function deleteUser(userId, userName) {
    if (!confirm(`⚠️ ARE YOU SURE you want to delete "${userName}"?\nThis will permanently delete their account and ALL their projects.`)) {
        return; 
    }

    try {
        const response = await fetch('/SSD/delete_user.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId })
        });
        
        const result = await response.json();
        
        if (result.status === "success") {
            showToast(`🗑️ User ${userName} deleted successfully!`);
            fetchData(); // بيحدث الجدول بعد المسح
        } else {
            showToast("❌ Error: " + result.error);
        }
    } catch (error) {
        console.error(error);
        showToast("❌ Connection error while deleting user.");
    }
}

function renderRecentUsers() {
    const tbody = document.getElementById('recentUsersTbody');
    tbody.innerHTML = users.slice(0,4).map(u => `
        <tr>
            <td>
                <div style="display:flex; gap:10px; align-items:center;">
                    <div class="u-avatar" style="background:${u.color}; width:28px; height:28px; font-size:10px;">${u.name.substring(0,2).toUpperCase()}</div>
                    <div class="u-name" style="font-size:12px;">${u.name}</div>
                </div>
            </td>
            <td><span class="role-pill ${u.role}" style="font-size:9px;">${u.role}</span></td>
            <td><span class="status-dot ${u.status}"></span></td>
            <td style="font-weight:bold; font-size:12px;">${u.projects}</td>
        </tr>
    `).join('');
}

// ── RENDER PROJECTS ──
function renderProjects() {
    const grid = document.getElementById('projectsGrid');
    grid.innerHTML = projects.map(p => `
        <div class="project-card">
            <div class="project-thumb" style="background:${p.bg}">${p.emoji}</div>
            <div class="project-body">
                <div class="project-owner">${p.project_name} <br><span style="font-size:11px; color:gray;">by ${p.owner}</span></div>
                <div style="margin-top:8px;">
                    <span class="project-tag">${p.room}</span>
                </div>
            </div>
            <div class="project-footer">
                <button class="action-btn" onclick="alert('Delete functionality is disabled for safety')"><i class="fas fa-trash" style="color:red;"></i></button>
            </div>
        </div>
    `).join('');
}

// ── RENDER ACTIVITIES ──
function renderActivities() {
    const html = activities.map(a => `
        <div class="feed-item">
            <div class="feed-icon"><i class="fas ${a.icon}"></i></div>
            <div><strong>${a.text}</strong><p style="font-size:11px; color:gray;">${a.time}</p></div>
        </div>
    `).join('');
    document.getElementById('miniActivityFeed').innerHTML = activities.slice(0,4).map(a => `
        <div class="feed-item"><div class="feed-icon"><i class="fas ${a.icon}"></i></div><div><strong>${a.text}</strong></div></div>
    `).join('');
    document.getElementById('fullActivityFeed').innerHTML = html;
}

// ── NAVIGATION & UTILS ──
function showSection(id, btn, icon, title, sub) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-' + id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.getElementById('pageTitle').textContent = title || id;
}

function showToast(msg) {
    document.getElementById('toastMsg').textContent = msg;
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}
function confirmLogout() {
    if (confirm('Are you sure you want to logout?')) {
        window.location.href = '/SSD/login/Login.html'; 
    }
}

window.onload = fetchData;
</script>
